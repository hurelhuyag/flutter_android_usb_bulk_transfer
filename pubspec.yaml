name: flutter_android_usb_bulk_transfer
description: "Transfers data between USB device using bulkTransfer method"
version: 0.0.1
homepage: https://github.com/hurelhuyag/flutter_android_usb_bulk_transfer

environment:
  sdk: ^3.11.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.github.hurelhuyag.flutter_android_usb_bulk_transfer
        pluginClass: FlutterAndroidUsbBulkTransferPlugin
